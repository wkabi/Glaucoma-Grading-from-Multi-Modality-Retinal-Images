name: fundus-oct
data_root: /home/bliu/work/Code/Optic/data/GAMMA_training_data/training_data
batch_size: 4
number_workers: 8
oct_depth_resize: "zoom"
oct_depth: 64
oct_sample_step: 4
train_mode: train
val_mode: val
test_mode: val
test_oct_depth_resize: sample

object:
  train:
    _target_: optic.data.data_pipeline
    dataset:
      _target_: optic.data.FundusDataset
      # Use absolute path for input to avoid messing with hydra output paths
      data_root: ${data.data_root}
      mode: ${data.train_mode}
      transformer:
        _target_: optic.data.img_augment
        is_train: True
      oct_transformer:
        _target_: optic.data.oct_augment
        is_train: True
      use_h5file: True
      return_oct: True
      oct_depth_resize: ${data.oct_depth_resize}
      oct_sample_step: ${data.oct_sample_step}
      oct_depth: ${data.oct_depth}
    batch_size: ${data.batch_size}
    number_workers: ${data.number_workers}
    shuffle: True

  val:
    _target_: optic.data.data_pipeline
    dataset:
      _target_: optic.data.FundusDataset
      data_root: ${data.data_root}
      mode: ${data.val_mode}
      # transformer:
      #   _target_: optic.data.img_augment
      #   is_train: False
      # oct_transformer:
      #   _target_: optic.data.oct_augment
      #   is_train: False
      use_h5file: True
      return_oct: True
      oct_depth_resize: ${data.test_oct_depth_resize}
      oct_sample_step: ${data.oct_sample_step}
      oct_depth: ${data.oct_depth}
    batch_size: 4
    number_workers: ${data.number_workers}
    shuffle: False

  test:
    _target_: optic.data.data_pipeline
    dataset:
      _target_: optic.data.FundusDataset
      data_root: ${data.data_root}
      mode: ${data.test_mode}
      use_h5file: True
      return_oct: True
      oct_depth_resize: ${data.test_oct_depth_resize}
      oct_sample_step: ${data.oct_sample_step}
      oct_depth: ${data.oct_depth}
    batch_size: 4
    number_workers: ${data.number_workers}
    shuffle: False