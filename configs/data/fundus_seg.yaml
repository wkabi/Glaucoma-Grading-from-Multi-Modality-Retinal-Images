name: fundus

train:
  _target_: optic.data.data_pipeline
  dataset:
    _target_: optic.data.FundusDataset
    # Use absolute path for input to avoid messing with hydra output paths
    data_root: ~/work/Code/Optic/data/GAMMA_training_data/training_data
    mode: train
    transformer:
      _target_: optic.data.fundus_augment
      size: [512, 512]
      is_train: True
    return_mask: True
  batch_size: 8
  number_workers: 4
  shuffle: True

val:
  _target_: optic.data.data_pipeline
  dataset:
    _target_: optic.data.FundusDataset
    data_root: ~/work/Code/Optic/data/GAMMA_training_data/training_data
    mode: val
    transformer:
      _target_: optic.data.fundus_augment
      size: [512, 512]
      is_train: False
    return_mask: True
  batch_size: 8
  number_workers: 4
  shuffle: False

test:
  _target_: optic.data.data_pipeline
  dataset:
    _target_: optic.data.FundusDataset
    data_root: ~/work/Code/OpticSeg/data/GAMMA_training_data/training_data
    mode: test
    transformer:
      _target_: optic.data.fundus_augment
      size: [512, 512]
      is_train: False
    return_mask: True
  batch_size: 8
  number_workers: 4
  shuffle: False
